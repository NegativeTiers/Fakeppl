# add-to-real: true -> displayed count = real connected players + fake-count
# add-to-real: false -> displayed count = fake-count exactly
add-to-real: true
fake-count: 25
max-players: 999

# Names shown when someone hovers the player count in the multiplayer list.
# They are only server-list samples, not real connected accounts.
sample-names:
  - Steve
  - Alex
  - MineTopPlayer
