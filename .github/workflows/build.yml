name: Build MineTopFakePlayers Pro

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle 8.10.2
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "8.10.2"

      - name: Build project
        run: gradle clean build --stacktrace --no-daemon

      - name: Collect JAR files
        if: success()
        run: |
          mkdir -p build-output
          find . -type f -path "*/build/libs/*.jar" ! -name "*-sources.jar" ! -name "*-javadoc.jar" -exec cp {} build-output/ \;
          echo "Built JAR files:"
          ls -lah build-output

      - name: Upload plugin JARs
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: MineTopFakePlayers-Pro
          path: build-output/*.jar
          if-no-files-found: error
          retention-days: 14
