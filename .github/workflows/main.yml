name: Build MineTopFakePlayers

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle 8.10.2
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Build plugins
        run: gradle clean build --stacktrace

      - name: Upload plugin JARs
        uses: actions/upload-artifact@v4
        with:
          name: MineTopFakePlayers-JARs
          if-no-files-found: error
          path: |
            paper/build/libs/*.jar
            velocity/build/libs/*.jar
